<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valhalla</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #0e0e0d;
        color: #f0ede8;
      }
      :root {
        --bg-0: #0e0e0d;
        --bg-1: #161614;
        --bg-2: #1e1e1b;
        --bg-3: #272724;
        --bg-4: #2f2f2b;
        --text-0: #f0ede8;
        --text-1: #b4b2a9;
        --text-2: #888780;
        --text-3: #5a5955;
        --amber: #ef9f27;
        --amber-dim: #ba7517;
        --amber-bg: #1a1208;
        --border: rgba(255,255,255,0.08);
        --border-md: rgba(255,255,255,0.14);
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }
      button { font-family: inherit; cursor: pointer; }
      textarea, input { font-family: inherit; }
      textarea:focus, input:focus { outline: none; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
      * { scrollbar-width: thin; scrollbar-color: var(--border-md) transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
